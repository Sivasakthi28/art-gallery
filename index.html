<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Aura Art Gallery</title>

    <link rel="stylesheet" href="css/style.css">
    
    <!-- Cropper.js CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">

    <!-- Razorpay Checkout -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <!-- EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <!-- Chart.js for Analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- html2pdf for Invoices -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <!-- ✅ ONLY YOUR MAIN JS (Firebase handled inside it) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script type="module" src="js/main.js"></script>
</head>

<body>

    <!-- =========================
         AUTH MODAL
    ========================== -->
    <div id="authModal" class="modal">
        <div class="modal-content">

            <span id="closeAuth">&times;</span>

            <h2>Create Account</h2>

            <input type="text" id="name" placeholder="Full Name">
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">

            <button id="signupBtn">Sign Up</button>

        </div>
    </div>

    <!-- =========================
         MAIN APP
    ========================== -->
    <div id="app">

        <header id="header">
            <div class="container navbar">

                <a href="#" class="logo" data-link="home">
                    <img src="images/logo.png" alt="Aura Art Logo" class="logo-img">
                    <span class="logo-text">Aura Art Gallery</span>
                </a>
                
                <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Toggle Navigation">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>

                <nav id="main-nav">
                    <ul class="nav-links">
                        <li><a href="#" data-link="home">Home</a></li>
                        <li><a href="#" data-link="shop">Shop</a></li>
                        <li id="nav-orders" style="display: none;"><a href="#" data-link="my-orders">My Orders</a></li>
                        <li id="nav-admin" style="display: none;"><a href="#" data-link="admin">Admin</a></li>
                    </ul>
                </nav>

                <div class="nav-actions">
                    <select onchange="window.appInstance.setCurrency(this.value)" class="nav-select">
                        <option value="USD" ${localStorage.getItem('currency') === 'USD' ? 'selected' : ''}>USD ($)</option>
                        <option value="INR" ${localStorage.getItem('currency') === 'INR' || !localStorage.getItem('currency') ? 'selected' : ''}>INR (₹)</option>
                    </select>
                    <select onchange="window.appInstance.setLanguage(this.value)" class="nav-select">
                        <option value="en" ${localStorage.getItem('language') === 'en' ? 'selected' : ''}>English</option>
                        <option value="ta" ${localStorage.getItem('language') === 'ta' ? 'selected' : ''}>தமிழ்</option>
                    </select>

                    <button id="wishlistBtn" onclick="window.appInstance.navigate('wishlist')" title="Wishlist">
                        ❤️
                    </button>

                    <button id="cartBtn">
                        🛒 <span id="cartCount">0</span>
                    </button>

                    <button id="userBtn">👤</button>
                </div>

            </div>
        </header>

        <!-- dynamic pages load here -->
        <main id="main-content"></main>

        <footer>
            <p style="text-align:center;">
                © 2026 Aura Art Gallery
            </p>
        </footer>

    </div>

    <!-- Fullscreen Image Preview Modal -->
    <div id="fullscreen-modal" class="fullscreen-modal" onclick="this.style.display='none'">
        <span class="close-fullscreen">&times;</span>
        <img id="fullscreen-img" src="" class="fullscreen-image">
        <div class="zoom-hint">Scroll or Pinch to zoom</div>
    </div>
    <a href="https://wa.me/9342954479?text=Hello! I have an inquiry about an artwork from Aura Art Gallery." class="whatsapp-float" target="_blank" aria-label="Chat on WhatsApp" style="position: fixed; bottom: 20px; right: 20px; background: #25D366; color: white; border-radius: 50%; width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); z-index: 1000;">
        <svg width="35" height="35" viewBox="0 0 24 24" fill="currentColor"><path d="M12.012 2c-5.508 0-9.987 4.479-9.987 9.987 0 1.763.459 3.419 1.264 4.862l-1.344 4.919 5.034-1.322c1.405.766 3.011 1.21 4.721 1.21 5.508 0 9.988-4.479 9.988-9.987 0-5.508-4.48-9.987-9.988-9.987zm0 18.287c-1.579 0-3.056-.411-4.339-1.129l-.311-.174-3.21.843.858-3.136-.192-.305c-.771-1.229-1.216-2.691-1.216-4.249 0-4.567 3.715-8.282 8.282-8.282s8.282 3.715 8.282 8.282c0 4.567-3.715 8.282-8.282 8.282zm4.534-6.22c-.249-.124-1.472-.726-1.7-.809-.228-.083-.393-.124-.559.124-.165.249-.641.809-.785.975-.144.165-.289.186-.538.062-.249-.124-1.05-.387-2.001-1.234-.74-.66-1.239-1.475-1.385-1.724-.144-.249-.015-.384.109-.508.112-.111.249-.289.373-.434.124-.144.165-.249.249-.414.083-.165.041-.311-.021-.434-.062-.124-.559-1.347-.765-1.844-.201-.487-.406-.421-.559-.429-.144-.008-.311-.01-.476-.01-.165 0-.434.062-.662.311-.228.249-.87.85-8.7 2.071 0 1.221.891 2.394 1.015 2.56.124.165 1.753 2.677 4.247 3.754.593.256 1.056.408 1.417.523.596.19 1.138.163 1.567.098.479-.072 1.472-.601 1.679-1.181.208-.58.208-1.077.144-1.181-.064-.103-.228-.165-.477-.289z"/></svg>
    </a>

    <!-- =========================
         CARD ENTRY MODAL
    ========================== -->
    <div id="cardModal" class="modal" style="display: none; align-items: center; justify-content: center; z-index: 2000;">
        <div class="modal-content" style="max-width: 600px; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
            <span id="closeCardModal" class="close-btn" style="float: right; cursor: pointer; font-size: 1.5rem; line-height: 1;">&times;</span>
            <h2 style="margin-top: 0; font-size: 1.2rem; border-bottom: 1px solid #ddd; padding-bottom: 10px; margin-bottom: 15px;">Add a credit or debit card</h2>
            
            <div style="display: flex; gap: 20px; flex-wrap: wrap;">
                <!-- Left Side: Form -->
                <div style="flex: 1; min-width: 250px;">
                    <div style="margin-bottom: 10px;">
                        <label style="display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px;">Card number</label>
                        <input type="text" id="card-number" placeholder="0000 0000 0000 0000" maxlength="19" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; outline: none;">
                    </div>
                    <div style="margin-bottom: 10px;">
                        <label style="display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px;">Name on card</label>
                        <input type="text" id="card-name" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; outline: none;">
                    </div>
                    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <div style="flex: 1;">
                            <label style="display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px;">Expiry date</label>
                            <div style="display: flex; gap: 5px;">
                                <select id="card-exp-month" style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; outline: none;">
                                    <option value="">MM</option>
                                    <option value="01">01</option><option value="02">02</option><option value="03">03</option><option value="04">04</option><option value="05">05</option><option value="06">06</option><option value="07">07</option><option value="08">08</option><option value="09">09</option><option value="10">10</option><option value="11">11</option><option value="12">12</option>
                                </select>
                                <select id="card-exp-year" style="flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; outline: none;">
                                    <option value="">YYYY</option>
                                    <option value="2026">2026</option><option value="2027">2027</option><option value="2028">2028</option><option value="2029">2029</option><option value="2030">2030</option><option value="2031">2031</option><option value="2032">2032</option>
                                </select>
                            </div>
                        </div>
                        <div style="width: 80px;">
                            <label style="display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 5px;">CVV</label>
                            <input type="text" id="card-cvv" maxlength="4" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; outline: none;">
                        </div>
                    </div>
                </div>

                <!-- Right Side: Logos -->
                <div style="width: 180px; background: #f7f7f7; padding: 15px; border-radius: 4px; display: flex; flex-direction: column; gap: 10px;">
                    <p style="font-size: 0.8rem; font-weight: bold; margin: 0;">We accept all major credit & debit cards</p>
                    <div style="display: flex; gap: 5px; flex-wrap: wrap;">
                        <span style="border: 1px solid #ccc; padding: 2px 5px; border-radius: 3px; font-size: 0.7rem; font-weight: bold; color: #1a1f71; background: #fff;">VISA</span>
                        <span style="border: 1px solid #ccc; padding: 2px 5px; border-radius: 3px; font-size: 0.7rem; font-weight: bold; color: #eb001b; background: #fff;">MasterCard</span>
                        <span style="border: 1px solid #ccc; padding: 2px 5px; border-radius: 3px; font-size: 0.7rem; font-weight: bold; color: #279b37; background: #fff;">Amex</span>
                        <span style="border: 1px solid #ccc; padding: 2px 5px; border-radius: 3px; font-size: 0.7rem; font-weight: bold; color: #005A9E; background: #fff;">Diners</span>
                        <span style="border: 1px solid #ccc; padding: 2px 5px; border-radius: 3px; font-size: 0.7rem; font-weight: bold; color: #f26622; background: #fff;">RuPay</span>
                    </div>
                </div>
            </div>

            <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; border-top: 1px solid #ddd; padding-top: 15px;">
                <button type="button" id="cancelCardBtn" style="padding: 10px 20px; border: 1px solid #ccc; background: #fff; color: #333; border-radius: 4px; cursor: pointer; font-weight: bold; font-family: inherit;" onclick="window.closeCardModal()">Cancel</button>
                <button type="button" id="continueCardBtn" style="padding: 10px 20px; border: 1px solid #a88734; background: #f0c14b; color: #111; border-radius: 4px; cursor: pointer; font-weight: bold; font-family: inherit;" onclick="window.submitCardModal()">Enter card details</button>
            </div>
        </div>
    </div>

    <div id="toast-container"></div>
    <div id="mobile-overlay" class="mobile-overlay"></div>
</body>

</html>
